<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burger House</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>

<body class="light">

<header>
  <h1>🍔 Burger House</h1>
  <nav>
    <a href="#menu">Menu</a>
    <a href="#contact">Aloqa</a>
  </nav>
  <button onclick="toggleTheme()">🌙</button>
</header>

<section class="hero">
  <h2>Eng mazali fast food 🔥</h2>
  <button onclick="scrollMenu()">Menu ko‘rish</button>
</section>

<section id="menu" class="menu">
  <h2>Menu</h2>

  <div class="cards">

    <div class="card hidden">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
      <h3>Cheese Burger</h3>
      <p>25 000 so‘m</p>
      <button onclick="order('Cheese Burger')">Buyurtma</button>
    </div>

    <div class="card hidden">
      <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
      <h3>Double Burger</h3>
      <p>35 000 so‘m</p>
      <button onclick="order('Double Burger')">Buyurtma</button>
    </div>

    <div class="card hidden">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
      <h3>Hot Dog</h3>
      <p>20 000 so‘m</p>
      <button onclick="order('Hot Dog')">Buyurtma</button>
    </div>

    <div class="card hidden">
      <img src="https://images.unsplash.com/photo-1586190848861-99aa4a171e90">
      <h3>Lavash</h3>
      <p>28 000 so‘m</p>
      <button onclick="order('Lavash')">Buyurtma</button>
    </div>

    <div class="card hidden">
      <img src="https://images.unsplash.com/photo-1598514983318-2f64f8f4796c">
      <h3>Cola</h3>
      <p>8 000 so‘m</p>
      <button onclick="order('Cola')">Buyurtma</button>
    </div>

    <div class="card hidden">
      <img src="https://images.unsplash.com/photo-1606755962773-d324e0a13086">
      <h3>Fries</h3>
      <p>12 000 so‘m</p>
      <button onclick="order('Fries')">Buyurtma</button>
    </div>

  </div>
</section>

<section id="contact">
  <h2>Aloqa</h2>
  <p>📍 Toshkent</p>
  <button onclick="telegram()">Telegram orqali yozish</button>
</section>

<script src="./script.js"></script>
</body>
</html>
